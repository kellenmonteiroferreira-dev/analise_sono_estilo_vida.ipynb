name: Rodar no Replicate

on:
  push:
    branches:
      - main

jobs:
  replicate-run:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar biblioteca Replicate
        run: |
          python -m pip install --upgrade pip
          pip install replicate

