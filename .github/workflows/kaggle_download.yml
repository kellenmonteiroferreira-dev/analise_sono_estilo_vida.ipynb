name: Baixar dataset do Kaggle

on:
  push:
    branches:
      - main

jobs:
  download-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install kaggle

      - name: Configurar Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo "{\"kellenferreira\":\"${{ secrets.KGAT_e263c3f36bd05fcaef21548a05ed4884 }}\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Baixar dataset do Kaggle
        run: |
          kaggle datasets download -d uom190346a/sleep-health-and-lifestyle-dataset -p ./data --unzip

      - name: Listar arquivos baixados
        run: |
          ls ./data
